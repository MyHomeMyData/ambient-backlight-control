# ambient-backlight-control configuration
#
# Values are in the unit returned by iio-sensor-proxy (check the log on startup:
# "ALS unit: lux" or "ALS unit: vendor"). Most systems return Lux; if yours
# returns vendor/raw units, scale the [als] and [keyboard] thresholds accordingly.
# Approximate conversion for Lenovo Yoga Slim 7: Lux ≈ raw / 1000.
#
# Restart the service after editing:
#   systemctl --user restart ambient-backlight-control

[als]
# Poll interval in seconds (how often the ALS sensor is read)
poll_interval = 1.0

# Smoothing: number of recent samples to average (1 = no smoothing)
smoothing_samples = 5

# ALS value that maps to brightness_min (darker than this → clamp to min)
als_min = 0

# ALS value that maps to brightness_max (brighter than this → clamp to max)
# ~1000 Lux covers all practical indoor/outdoor conditions
als_max = 1000

[display]
# Minimum display brightness (0–96000). Never go below this even in darkness.
# 14400 = 15% of 96000 — prevents the screen from going unreadably dark
brightness_min = 14400

# Maximum display brightness (0–96000)
brightness_max = 96000

# Curve exponent (gamma). Controls the ALS→brightness mapping shape.
#   1.0 = linear mapping
#   < 1.0 = more brightness at low light levels (recommended: 0.4–0.6)
# With 0.5 (square root): at 25% ALS → 50% brightness, at 100% ALS → 100% brightness
curve_exponent = 0.5

# Fade speed: brightness steps applied per second during transitions
fade_steps_per_second = 30

# Maximum brightness change per fade step (0–96000)
# 2000 = ~2% of max per step, smooth but fast enough
fade_max_step = 2000

# Manual offset per brightness-key press (Fn+F5 / Fn+F6), as fraction of brightness_max
# 0.05 = 5% of 96000 = 4800 per keypress
manual_offset_step = 0.05

# Maximum absolute offset in either direction, as fraction of brightness_max
# 0.25 = ±25% of 96000 = ±24000
manual_offset_limit = 0.25

[keyboard]
# ALS value below which the keyboard backlight turns ON
# 25 Lux → dim room
kbd_backlight_on_threshold = 25

# ALS value above which the keyboard backlight turns OFF (must be > on_threshold)
# Hysteresis gap prevents rapid switching near the threshold
kbd_backlight_off_threshold = 30

# Maximum keyboard backlight brightness (check your hardware: typically 2)
kbd_backlight_max = 2

[paths]
# sysfs paths — only change if your hardware differs from Lenovo Yoga Slim 7 14ITL05
als_raw_path = /sys/bus/iio/devices/iio:device0/in_illuminance_raw
display_brightness_path = /sys/class/backlight/intel_backlight/brightness
display_brightness_max_path = /sys/class/backlight/intel_backlight/max_brightness
kbd_brightness_path = /sys/class/leds/platform::kbd_backlight/brightness
